name = "hackbox-api"
main = "src/index.ts"
compatibility_date = "2026-04-09"
workers_dev = true

# Install this worker's dependencies before wrangler bundles `main`. Workers
# Builds runs `npx wrangler deploy -c api/wrangler.toml` from the repo root with
# no install step, so without this esbuild can't resolve `hono`. `wrangler
# deploy` runs this command (from the repo root) automatically; the deps live in
# api/, not the root, so cd in first.
[build]
command = "cd api && npm install"

# Serve the HTTP API under the apex at hackbox.ca/api/* — a path prefix, not an
# `api.` subdomain (subdomains get reset by some users' SNI-filtering middleboxes).
# Routes alongside the relay (hackbox.ca/r/*) and the client (apex catch-all).
#   routes = [{ pattern = "hackbox.ca/api/*", zone_name = "hackbox.ca" }]

# Service binding to the relay Worker. The api Worker calls the relay's HTTP
# surface (/r/<code> and /r/<code>/init) to allocate and probe rooms; all
# room state lives in the relay's Durable Objects.
[[services]]
binding = "RELAY"
service = "hackbox-relay"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
