name = "hackbox-api"
main = "src/index.ts"
compatibility_date = "2026-04-09"
workers_dev = true

# Once DNS is cut over, serve the public HTTP API under the production host
# alongside the relay (app.hackbox.ca/parties/*) and client:
#   routes = [{ pattern = "app.hackbox.ca/rooms*", zone_name = "hackbox.ca" }]
# /healthcheck would route similarly.

# Service binding to the relay Worker. The api Worker calls the relay's HTTP
# surface (/parties/main/<code> and .../init) to allocate and probe rooms; all
# room state lives in the relay's Durable Objects.
[[services]]
binding = "RELAY"
service = "hackbox-relay"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
