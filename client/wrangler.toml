name = "hackbox-client"
main = "worker/index.js"
compatibility_date = "2026-04-09"
workers_dev = true

# Serve the SPA from the apex as a Custom Domain (auto-managed DNS + cert, and it
# survives Worker renames). The api (hackbox.ca/api/*) and relay (hackbox.ca/r/*)
# routes are more specific and take precedence, so this catch-all serves only the
# SPA for everything else.
routes = [{ pattern = "hackbox.ca", custom_domain = true }]

# Build the SPA before deploying. With this Worker's root directory set to
# client/ in Workers Builds, dependencies (including devDeps like vite) are
# installed automatically, so this only builds. `build-only` skips the vue-tsc
# type-check to keep deploys fast. Output lands in client/dist, which [assets]
# below points at. Workers Builds triggers a deploy on pushes that change files
# under client/ (its configured root directory).
[build]
command = "npm run build-only"

# Vite's default output directory.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
