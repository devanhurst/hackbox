name = "hackbox-client"
main = "worker/index.js"
compatibility_date = "2026-04-09"
workers_dev = true

# Serve the SPA from the apex. Bind hackbox.ca directly to this Worker via
# Cloudflare DNS so it survives Worker renames:
#   routes = [{ pattern = "hackbox.ca/*", zone_name = "hackbox.ca" }]
# The api (hackbox.ca/api/*) and relay (hackbox.ca/r/*) routes are more
# specific and take precedence, so this catch-all serves only the SPA.

# Install deps and build the SPA before deploying. Workers Builds runs
# `npx wrangler deploy -c client/wrangler.toml` from the repo root with no
# install step, so cd into client/ first, install (including devDeps — vite is a
# devDep, and CI may set NODE_ENV=production), then build. `build-only` skips the
# vue-tsc type-check to keep deploys fast. Output lands in client/dist, which
# [assets] below points at (relative to this config file).
[build]
command = "cd client && npm install --include=dev && npm run build-only"

# Vite's default output directory.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
