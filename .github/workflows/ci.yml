name: CI

on:
  push:
    branches: [main]
  pull_request:

# Each Cloudflare Worker has its own package-lock.json (no root workspaces), so
# jobs install per-directory. Workers Builds still handles deploys; this gate
# runs *before* that, so a red test blocks the merge.
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
        env:
          HUSKY: "0"
      - run: npm run fmt:check

  relay:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: relay/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm test

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm test

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: admin/package-lock.json
      # `npm ci` runs the postinstall `nuxt prepare`, generating .nuxt/tsconfig
      # which both the type-check and the test transform resolve against.
      - run: npm ci
      - run: npm run type-check
      - run: npm test
