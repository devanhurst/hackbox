name = "hackbox-relay"
main = "src/index.ts"
compatibility_date = "2026-04-09"
workers_dev = true

# Once DNS is cut over, serve the relay under the production host so a single
# origin survives Worker renames (mirrors the jparty relay layout):
#   routes = [{ pattern = "app.hackbox.ca/parties/*", zone_name = "hackbox.ca" }]

[durable_objects]
bindings = [{ name = "Main", class_name = "Room" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# TWITCH_CLIENT_ID is a secret, set via `wrangler secret put TWITCH_CLIENT_ID`
# (not committed here). The DO reads it from `env` to authenticate members.

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
