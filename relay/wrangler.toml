name = "hackbox-relay"
main = "src/index.ts"
compatibility_date = "2026-04-09"
# workers_dev disabled: the relay's `/admin/*` surface (registry listing, room
# status) must only be reachable via service bindings, never publicly. The
# *.workers.dev URL would expose it, so the relay is reachable only via the
# hackbox.ca/r/* zone route + service bindings.
workers_dev = false

# This worker's dependencies are installed by Workers Builds (its root directory
# is set to relay/, which has its own package-lock.json), so no [build] step is
# needed — wrangler bundles `main` directly. Workers Builds triggers a deploy on
# pushes that change files under relay/.

# Serve the relay under the apex at hackbox.ca/r/* — a single static path
# prefix, not a `relay.` subdomain (those get reset by some users' SNI-filtering
# middleboxes; the apex is the durable fix). The WS endpoint is the minimal
# wss://hackbox.ca/r/<code>; routing is handled by hand in src/index.ts and
# matched by the client SDK's partysocket basePath.
routes = [{ pattern = "hackbox.ca/r/*", zone_name = "hackbox.ca" }]

[durable_objects]
bindings = [{ name = "Main", class_name = "Room" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Registry"]

# Registry was superseded by D1 history and is now removed. Deleting the class
# drops the binding and any leftover DO instances + their storage (it was no
# longer instantiated, so there is nothing live to lose).
[[migrations]]
tag = "v3"
deleted_classes = ["Registry"]

# Permanent room history. The Room DO writes a row on creation and stamps
# ended_at on expiry. It also batches the admin monitor's message log here
# (db/schema.sql `messages`). Schema: db/schema.sql (repo root).
[[d1_databases]]
binding = "DB"
database_name = "hackbox"
database_id = "a49f51a3-4b43-4f2c-8dc5-2220d9f58df9"

# Daily retention sweep for the `messages` log — the `scheduled` handler in
# src/index.ts deletes rows past the 30-day window so D1 stays under its size
# cap. 04:00 UTC, off-peak.
[triggers]
crons = ["0 4 * * *"]

# TWITCH_CLIENT_ID is the relay's Twitch app id, used as the `Client-Id` header
# when validating members' OAuth tokens. It is a *public* identifier (already
# exposed in the browser), so it lives here as a plaintext var rather than a
# secret. Declaring it in config is deliberate: `wrangler deploy` makes the
# Worker's vars exactly match this file (keep_vars defaults to false), so a var
# set only in the dashboard would be wiped on the next deploy — which is how it
# previously became unset. It must match the client's Twitch app
# (VITE_TWITCH_CLIENT_ID) or token validation 401s.
[vars]
TWITCH_CLIENT_ID = "qlfz8nlzzkq20jhl1xuawhza5xa3fm"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
